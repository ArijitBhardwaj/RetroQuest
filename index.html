<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1A0533" />
  <title>A Journey with Us ♥</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #1A0533;
      overflow: hidden;
      /* Prevent pull-to-refresh and over-scroll on Samsung browser */
      overscroll-behavior: none;
      -ms-scroll-chaining: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    /* Phaser renders into this container — it handles centering internally */
    #game-container {
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    canvas {
      display: block;
      touch-action: none;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      image-rendering: -moz-crisp-edges;
    }

    /* ── Photo Overlay — "moment collected" reveal ── */
    #photo-overlay {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: rgba(6, 1, 18, 0.92);
      opacity: 0;
      transition: opacity 0.55s ease;
      z-index: 9999;
      cursor: pointer;
      touch-action: manipulation;
    }
    #photo-overlay.visible {
      opacity: 1;
    }
    /* Badge above photo */
    #photo-overlay .photo-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: rgba(255, 210, 240, 0.80);
      letter-spacing: 3px;
      text-shadow: 0 0 12px rgba(255, 100, 180, 0.6);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease 0.3s;
    }
    #photo-overlay.visible .photo-badge {
      opacity: 1;
    }
    /* Photo — scales in as it fades in */
    #photo-overlay img {
      max-width: min(88vw, 400px);
      max-height: min(72vh, 620px);
      object-fit: contain;
      border-radius: 14px;
      box-shadow:
        0 0 0 2px rgba(255, 107, 157, 0.35),
        0 0 40px rgba(255, 107, 157, 0.45),
        0 0 90px rgba(120, 0, 60, 0.25);
      /* Smooth rendering — NOT pixelated */
      image-rendering: auto;
      -webkit-image-rendering: auto;
      transform: scale(0.93);
      transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity  0.55s ease;
      opacity: 0;
    }
    #photo-overlay.visible img {
      transform: scale(1);
      opacity: 1;
    }
    /* Caption below photo */
    #photo-overlay .photo-caption {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: rgba(255, 200, 230, 0.65);
      text-align: center;
      pointer-events: none;
      text-shadow: 0 1px 6px #330011;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.4s ease 0.45s;
    }
    #photo-overlay.visible .photo-caption {
      opacity: 1;
    }
  </style>
  <!-- Google Fonts: Press Start 2P (pixel font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <!-- Photo overlay — "moment collected" reveal -->
  <div id="photo-overlay">
    <div class="photo-badge">✦ &nbsp; moment collected &nbsp; ✦</div>
    <img src="" alt="" />
    <div class="photo-caption">tap to continue  ♥</div>
  </div>

  <!-- Phaser mounts the canvas inside this container -->
  <div id="game-container"></div>

  <!-- Phaser 3 game engine -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!-- Personal content (EDIT THIS FILE to personalise!) -->
  <script src="data/messages.js"></script>

  <!-- Game objects -->
  <script src="objects/AudioManager.js"></script>
  <script src="objects/Player.js"></script>
  <script src="objects/MobileControls.js"></script>

  <!-- Scenes (order matters — Boot must be first) -->
  <script src="scenes/BootScene.js"></script>
  <script src="scenes/PreloadScene.js"></script>
  <script src="scenes/MenuScene.js"></script>
  <script src="scenes/GameScene.js"></script>
  <script src="scenes/SpaceScene.js"></script>
  <script src="scenes/EndScene.js"></script>

  <!-- Main Phaser config (runs last) -->
  <script src="game.js"></script>
</body>
</html>
